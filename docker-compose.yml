services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: afm-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: afm_flights
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - afm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d afm_flights"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  afm_postgres_data:
